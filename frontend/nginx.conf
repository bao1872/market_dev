# V1.1 交易平台 - 前端 nginx 配置
# 职责：托管 SPA 静态资源 + 反向代理 /api 到后端服务
#
# [nginx DNS] - Docker 容器重建后 backend IP 会变化，必须配置 resolver 并在
# proxy_pass 中使用变量，强制 nginx 在每次请求时重新解析 backend 主机名。
# 否则 backend 容器重建后 frontend nginx 仍连接旧 IP，导致所有 /api 请求 502。

server {
    listen 80;
    server_name _;

    # Docker 嵌入式 DNS，valid=10s 控制缓存 TTL
    resolver 127.0.0.11 valid=10s;

    # SPA 静态资源根目录
    root /usr/share/nginx/html;
    index index.html;

    # ===== gzip 压缩 =====
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # ===== /api 反向代理到后端（去掉 /api 前缀） =====
    # 使用变量而非静态 upstream，确保 backend 容器 IP 变化后自动重新解析。
    # proxy_pass 使用变量时不会自动剥离 location 前缀，需配合 rewrite。
    location /api/ {
        set $backend_url backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（盘中实时推送）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===== index.html 禁止缓存，确保新 bundle 生效 =====
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ===== hash 化的 JS/CSS 长期缓存 =====
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ===== SPA 前端路由回退 =====
    location / {
        try_files $uri $uri/ /index.html;
    }
}
