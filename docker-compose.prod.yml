# V1.1 交易平台 - 生产环境 Docker Compose
# 包含 4 个服务：redis, backend, worker, frontend
# PostgreSQL 使用物理机实例，不再创建容器
# 用法: docker compose -f docker-compose.prod.yml up -d

services:
  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===== 后端 API 服务 =====
  backend:
    build:
      context: ./backend
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: trading-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://bz:es123456@host.docker.internal:5432/bz_stock
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32bytes}
      APP_ENV: production
      TZ: Asia/Shanghai
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ===== 后台任务 Worker =====
  worker:
    build:
      context: ./backend
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: trading-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://bz:es123456@host.docker.internal:5432/bz_stock
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32bytes}
      APP_ENV: production
      WORKER_TYPE: all
      WORKER_INTERVAL: "5"
      TZ: Asia/Shanghai
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.worker

  # ===== 前端 Nginx 服务 =====
  frontend:
    build:
      context: ./frontend
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: trading-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  redisdata:
    name: trading-redisdata
