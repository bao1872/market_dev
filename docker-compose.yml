# V1.1 交易平台 - 本地开发环境
# Redis 7（PostgreSQL 使用物理机实例，不再创建容器）
services:
  redis:
    image: redis:7
    container_name: trading-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redisdata:
    name: trading-redisdata
