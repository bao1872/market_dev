name: Debt Reports

# 存量债务报告工作流（与 PR CI 解耦）。
# 目的：Ruff / Mypy 全仓债务总数仅作趋势报告与人工审计，不阻断 PR 合并。
# PR 门禁由 ci.yml 中的 ruff-new-files / ruff-baseline-regression / mypy-new-files /
# mypy-baseline-regression 负责（新增债务由这些硬门禁拦截）。
# 本工作流定时（每日）与手动触发，仅上传报告产物，失败不影响任何合并状态。

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  ruff-full-repository-report:
    name: Ruff Full Repository Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run ruff on full repository and upload report
        working-directory: backend
        run: |
          set +e
          ruff check . --output-format=json --output-file=ruff-full-report.json
          echo "This is historical debt; new debt is blocked by Ruff New Files and Ruff Baseline Regression in CI."
          exit 0
      - name: Upload ruff full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-full-report
          path: backend/ruff-full-report.json

  mypy-full-report:
    name: Mypy Full Repository Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run mypy on full repository and upload report
        working-directory: backend
        run: |
          set +e
          mypy app \
            --output json \
            --show-error-codes \
            --no-error-summary \
            --hide-error-context \
            --no-pretty \
            > mypy-full-report.jsonl
          echo "This is historical debt; new debt is blocked by Mypy New Files and Mypy Baseline Regression in CI."
          exit 0
      - name: Upload mypy full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-full-report
          path: backend/mypy-full-report.jsonl
