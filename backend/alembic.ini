# Alembic 配置 - V1.1 交易平台
# 指向 backend/alembic/ 目录
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# 运行时由 alembic/env.py 通过 DATABASE_URL 环境变量或 app.config 覆盖，此处仅占位
sqlalchemy.url = postgresql+psycopg://user:password@localhost:5432/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
