name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 生产环境所有服务使用 Asia/Shanghai 时区，CI runner 需保持一致，
# 避免 datetime.now()/date.today() 在 UTC 下产生与生产不同的结果。
env:
  TZ: Asia/Shanghai

jobs:
  architecture-rules:
    name: Architecture Rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run architecture rules checks
        run: python tools/check_architecture.py

  docs-consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run docs consistency checks
        run: python tools/check_docs_consistency.py

  test-allowlist:
    name: Test Allowlist
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run test allowlist checks
        run: python tools/check_test_allowlist.py

  ruff-new-files:
    name: Ruff New Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run ruff on new Python files only
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            # 处理初次 push 或空 before SHA，不允许静默跳过
            if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                BASE_SHA=$(git rev-parse HEAD~1)
              else
                BASE_SHA=$(git rev-parse HEAD)
              fi
            fi
          fi

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"

          NEW_BACKEND_FILES=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- 'backend/*.py' 'backend/**/*.py' | sed 's|^backend/||' | tr '\n' ' ' || true)
          NEW_ROOT_TOOLS=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- 'tools/*.py' 'tools/**/*.py' | sed 's|^|../|' | tr '\n' ' ' || true)

          cd backend

          if [ -n "$NEW_BACKEND_FILES" ]; then
            echo "New backend Python files:"
            echo "$NEW_BACKEND_FILES"
            ruff check $NEW_BACKEND_FILES
          else
            echo "No new backend Python files."
          fi

          if [ -n "$NEW_ROOT_TOOLS" ]; then
            echo "New root tools Python files:"
            echo "$NEW_ROOT_TOOLS"
            ruff check --config pyproject.toml $NEW_ROOT_TOOLS
          else
            echo "No new root tools Python files."
          fi

  ruff-baseline-regression:
    name: Ruff Baseline Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run ruff and compare with baseline
        working-directory: backend
        run: |
          set -euo pipefail
          ruff check . --output-format=json --output-file=ruff-full-report.json || true
          python ../tools/compare_ruff_baseline.py ruff-full-report.json ../tools/quality_baselines/ruff.json

  ruff-full-repository-report:
    name: Ruff Full Repository Report
    runs-on: ubuntu-latest
    # 该任务仅展示历史债务总数并上传报告，不阻断合并；新增债务由 Ruff Baseline Regression 任务判断。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run ruff on full repository and upload report
        working-directory: backend
        run: |
          set +e
          ruff check . --output-format=json --output-file=ruff-full-report.json
          EXIT_CODE=$?
          COUNT=$(jq '. | length' ruff-full-report.json)
          echo "Ruff full repository raw error count: $COUNT"
          echo "This is historical debt; new debt is blocked by Ruff New Files and Ruff Baseline Regression."
          exit $EXIT_CODE
      - name: Upload ruff full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-full-report
          path: backend/ruff-full-report.json

  mypy-new-files:
    name: Mypy New Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Determine base and head SHAs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            BASE_SHA="${{ github.event.before }}"
            if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                BASE_SHA=$(git rev-parse HEAD~1)
              else
                BASE_SHA=$(git rev-parse HEAD)
              fi
            fi
            echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
            echo "HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - name: Run mypy on backend
        working-directory: backend
        run: |
          mypy app \
            --output json \
            --show-error-codes \
            --no-error-summary \
            --hide-error-context \
            --no-pretty \
            > mypy-report.jsonl
      - name: Check new app files for mypy errors
        run: python tools/check_mypy_new_files.py "$BASE_SHA" "$HEAD_SHA" backend/mypy-report.jsonl

  mypy-baseline-regression:
    name: Mypy Baseline Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run mypy on backend
        working-directory: backend
        run: |
          mypy app \
            --output json \
            --show-error-codes \
            --no-error-summary \
            --hide-error-context \
            --no-pretty \
            > mypy-report.jsonl
      - name: Compare with mypy baseline
        run: python tools/compare_mypy_baseline.py backend/mypy-report.jsonl tools/quality_baselines/mypy.json

  mypy-full-report:
    name: Mypy Full Repository Report
    runs-on: ubuntu-latest
    # 该任务仅展示历史债务总数并上传报告，不阻断合并；新增债务由 Mypy New Files 和 Mypy Baseline Regression 任务判断。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run mypy on full repository and upload report
        working-directory: backend
        run: |
          set +e
          mypy app \
            --output json \
            --show-error-codes \
            --no-error-summary \
            --hide-error-context \
            --no-pretty \
            > mypy-full-report.jsonl
          EXIT_CODE=$?
          COUNT=$(jq -s 'length' mypy-full-report.jsonl)
          echo "Mypy full repository raw error count: $COUNT"
          echo "This is historical debt; new debt is blocked by Mypy New Files and Mypy Baseline Regression."
          exit $EXIT_CODE
      - name: Upload mypy full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-full-report
          path: backend/mypy-full-report.jsonl

  alembic-cycle:
    name: Alembic Upgrade / Downgrade / Upgrade
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bz
          POSTGRES_PASSWORD: bz
          POSTGRES_DB: bz_stock_test
          TZ: Asia/Shanghai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://bz:bz@localhost:5432/bz_stock_test
      TEST_DATABASE_URL: postgresql+asyncpg://bz:bz@localhost:5432/bz_stock_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U bz && break
            sleep 1
          done
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Alembic downgrade base
        run: alembic downgrade base
      - name: Alembic upgrade head again
        run: alembic upgrade head

  postgres-integration-tests:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    needs:
      - architecture-rules
      - ruff-new-files
      - ruff-baseline-regression
      - mypy-new-files
      - mypy-baseline-regression
      - alembic-cycle
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bz
          POSTGRES_PASSWORD: bz
          POSTGRES_DB: bz_stock_test
          TZ: Asia/Shanghai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql+asyncpg://bz:bz@localhost:5432/bz_stock_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U bz && break
            sleep 1
          done
      - name: Run pytest
        run: pytest --tb=short -q

  frontend-tsc:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run TypeScript check
        run: npx tsc --noEmit

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs:
      - frontend-tsc
      - frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
