strategy_id: watchlist_monitor
kind: monitor
version: 1.0.0
display_name: 自选股监控
description: 唯一监控算法，包含布林带穿越和成交量节点触碰检测
entrypoint: app.strategy.monitors.watchlist_monitor:WatchlistMonitor
input:
  bar_frequency: 1m
  min_bars: 360
  adjustment: forward
  markets: [SSE, SZSE, BSE]
capabilities:
  composable: true
  supports_plan_conditions: true
  supports_table_schema: true
  supports_chart_layers: true
  supports_backtest: true
parameters:
  # BB 参数（来自 bb_monitor）
  - key: algorithm.bb_win
    type: integer
    default: 20
    allowed_scopes: [strategy]
    algorithm_affecting: true
  - key: algorithm.bb_k
    type: float
    default: 2.0
    allowed_scopes: [strategy]
    algorithm_affecting: true
  # VN 参数（来自 volume_node_monitor）
  - key: algorithm.lookback
    type: integer
    default: 360
    allowed_scopes: [strategy]
    algorithm_affecting: true
outputs:
  # BB 输出（来自 bb_monitor）
  - key: bb_upper
    type: number
    description: 布林带上轨
  - key: bb_mid
    type: number
    description: 布林带中轨
  - key: bb_lower
    type: number
    description: 布林带下轨
  - key: current_price
    type: number
    description: 当前价格
  - key: prev_close
    type: number
    description: 前一根1分钟收盘价
  - key: bb_width
    type: number
    description: 布林带宽度
  - key: bb_pos
    type: number
    description: 布林带位置（0-1）
  # VN 输出（来自 volume_node_monitor）
  - {key: upper_node, type: json}
  - {key: lower_node, type: json}
  - {key: position_0_1, type: number, unit: ratio_0_1, sortable: true}
  - {key: poc_price, type: json}
  - {key: last_touched_node, type: json}
event_types:
  # BB 事件（来自 bb_monitor）
  - key: bb_upper_touch
    allowed_roles: [TRIGGER, CONFIRM, OBSERVE]
    dedupe: boundary_cooldown
    state_ttl_seconds: 600
  - key: bb_mid_touch
    allowed_roles: [TRIGGER, CONFIRM, OBSERVE]
    dedupe: boundary_cooldown
    state_ttl_seconds: 600
  - key: bb_lower_touch
    allowed_roles: [TRIGGER, CONFIRM, OBSERVE]
    dedupe: boundary_cooldown
    state_ttl_seconds: 600
  # VN 事件（来自 volume_node_monitor）
  - key: node_cluster_touch
    allowed_roles: [TRIGGER, CONFIRM, OBSERVE]
    dedupe: touch_episode
    state_ttl_seconds: 120
chart_layers:
  - id: bb
    name: Bollinger Bands
    renderer: band
    pane: price
    color: "rgba(156,39,176,0.15)"
    fields: [bb_upper, bb_lower, bb_mid]
    hover_fields: [bb_upper, bb_lower, bb_mid]
  - id: volume_node
    name: Volume Node
    renderer: price_zone
    pane: price
    color: "rgba(33,150,243,0.50)"
    fields: [upper_node, lower_node, poc_price]
    hover_fields: [current_price, upper_node, lower_node, position_0_1, poc_price]
    description: "Volume Node Cluster 区间"
resource_budget:
  target_ms_per_instrument: 700
