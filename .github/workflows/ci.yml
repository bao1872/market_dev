name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-rules:
    name: Architecture Rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run architecture rules checks
        run: python tools/check_architecture.py

  docs-consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run docs consistency checks
        run: python tools/check_docs_consistency.py

  test-allowlist:
    name: Test Allowlist
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Run test allowlist checks
        run: python tools/check_test_allowlist.py

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    # Phase A：ruff 全绿是后续独立清理任务，当前仅报告不阻塞 workflow。
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    # Phase A：mypy 全绿是后续独立清理任务，当前仅报告不阻塞 workflow。
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: mypy app

  alembic-cycle:
    name: Alembic Upgrade / Downgrade / Upgrade
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bz
          POSTGRES_PASSWORD: bz
          POSTGRES_DB: bz_stock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://bz:bz@localhost:5432/bz_stock_test
      TEST_DATABASE_URL: postgresql+asyncpg://bz:bz@localhost:5432/bz_stock_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U bz && break
            sleep 1
          done
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Alembic downgrade base
        run: alembic downgrade base
      - name: Alembic upgrade head again
        run: alembic upgrade head

  postgres-integration-tests:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    needs:
      - architecture-rules
      - ruff
      - type-check
      - alembic-cycle
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bz
          POSTGRES_PASSWORD: bz
          POSTGRES_DB: bz_stock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql+asyncpg://bz:bz@localhost:5432/bz_stock_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U bz && break
            sleep 1
          done
      - name: Run pytest
        run: pytest

  frontend-tsc:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run TypeScript check
        run: npx tsc --noEmit

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs:
      - frontend-tsc
      - frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
